<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CageRanks — MMA Fighter Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C870;--red:#D72B2B;--green:#1D9E75;--bg:#0A0A0A;--bg2:#111;--bg3:#1A1A1A;--bg4:#161616;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#F0F0F0;--muted:#999;--muted2:#777;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
header{border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);z-index:100;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:0.06em;display:flex;align-items:center;gap:9px;}
.logo-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.7)}}
.header-right{display:flex;align-items:center;gap:10px;}
.sync-bar{padding:6px 1.5rem;background:rgba(201,168,76,.03);border-bottom:1px solid rgba(201,168,76,.08);display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(201,168,76,.55);font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;}
.sync-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;flex-shrink:0;}
.hero{padding:1.75rem 1.5rem 1.25rem;border-bottom:1px solid var(--border);}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(32px,5.5vw,56px);line-height:.92;text-transform:uppercase;margin-bottom:8px;}
.hero h1 em{color:var(--gold);font-style:normal;display:block;}
.hero p{color:var(--muted);font-size:13px;max-width:480px;line-height:1.55;}
.nav-wrap{position:sticky;top:58px;z-index:90;background:rgba(10,10,10,.98);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-row{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 1.5rem;}
.nav-row::-webkit-scrollbar{display:none;}
.nav-row-men{border-bottom:1px solid rgba(255,255,255,.04);}
.nav-row-label{padding:0 10px;height:38px;display:flex;align-items:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);white-space:nowrap;flex-shrink:0;}
.weight-tab{padding:0 11px;height:38px;display:flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;background:none;white-space:nowrap;transition:color .15s,border-color .15s;flex-shrink:0;}
.weight-tab:hover{color:var(--text);}
.weight-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-lbs{font-size:8px;color:var(--muted2);font-weight:400;}
.weight-tab.active .tab-lbs{color:rgba(201,168,76,.45);}
.view-bar{padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border);}
.view-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.view-btn{padding:6px 13px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;transition:all .15s;}
.view-btn:hover{color:var(--text);}
.view-btn.active{background:var(--gold);color:#000;}
.div-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.05em;}
.div-label strong{color:var(--text);font-size:15px;}
.tp-strip{padding:10px 1.5rem;border-bottom:1px solid var(--border);background:rgba(201,168,76,.02);}
.tp-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;font-weight:700;}
.tp-cards{display:flex;gap:7px;flex-wrap:wrap;}
.tp-card{flex:1;min-width:150px;background:var(--bg4);border:1px solid var(--border);border-radius:3px;padding:9px 11px;border-left:3px solid var(--muted2);}
.tp-card.tp-up{border-left-color:var(--green);}
.tp-card.tp-down{border-left-color:var(--red);}
.tp-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;line-height:1;}
.tp-num.up{color:var(--green);}.tp-num.down{color:var(--red);}.tp-num.neutral{color:var(--muted);}
.tp-body{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4;}
.tp-body strong{color:#AAA;}
.main{padding:1.25rem 1.5rem 4rem;}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.col-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:.18em;text-transform:uppercase;}
.col-title.yours{color:var(--gold);}.col-title.official{color:var(--muted);}
.col-legend{display:flex;gap:8px;}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted2);font-family:'Barlow Condensed',sans-serif;}
.leg-dot{width:5px;height:5px;border-radius:50%;}
.fighter-list{display:flex;flex-direction:column;gap:3px;}
.fighter-row{display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:10px;padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:2px;transition:background .12s,border-color .12s;animation:fadeUp .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fighter-list .fighter-row:nth-child(1){animation-delay:.03s}.fighter-list .fighter-row:nth-child(2){animation-delay:.06s}.fighter-list .fighter-row:nth-child(3){animation-delay:.09s}.fighter-list .fighter-row:nth-child(4){animation-delay:.12s}.fighter-list .fighter-row:nth-child(5){animation-delay:.14s}.fighter-list .fighter-row:nth-child(6){animation-delay:.16s}.fighter-list .fighter-row:nth-child(7){animation-delay:.18s}.fighter-list .fighter-row:nth-child(8){animation-delay:.20s}.fighter-list .fighter-row:nth-child(9){animation-delay:.22s}.fighter-list .fighter-row:nth-child(10){animation-delay:.24s}.fighter-list .fighter-row:nth-child(11){animation-delay:.26s}
.fighter-row:hover{background:var(--bg3);border-color:var(--border2);}
.fighter-row.champ{border-color:rgba(201,168,76,.2);background:rgba(201,168,76,.04);}
.fighter-row.champ:hover{background:rgba(201,168,76,.07);}
.rank-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:var(--muted2);text-align:center;line-height:1;}
.rank-num.c{font-size:11px;color:var(--gold);letter-spacing:.05em;}
.fighter-info{min-width:0;}
.fighter-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fighter-row.champ .fighter-name{color:var(--gold-light);}
.fighter-meta{display:flex;align-items:center;gap:5px;margin-top:2px;flex-wrap:wrap;}
.record{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.tag{font-size:9px;padding:1px 5px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.tag-former{background:rgba(201,168,76,.12);color:var(--gold);}
.tag-streak{background:rgba(215,43,43,.12);color:#E05555;}
.row-right{display:flex;align-items:center;gap:8px;}
.score-block{text-align:right;}
.score-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:var(--text);line-height:1;}
.score-lbl{font-size:9px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}
.score-bars{display:flex;gap:2px;margin-top:3px;justify-content:flex-end;}
.mini-bar{width:3px;height:13px;border-radius:1px;background:var(--bg3);position:relative;overflow:hidden;}
.mini-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:1px;}
.vote-block{display:flex;align-items:center;gap:4px;}
.vote-btn{display:flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:4px 7px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Barlow Condensed',sans-serif;white-space:nowrap;}
.vote-btn.up-btn:hover:not(.locked){border-color:var(--green);color:var(--green);background:rgba(29,158,117,.08);}
.vote-btn.dn-btn:hover:not(.locked){border-color:var(--red);color:var(--red);background:rgba(215,43,43,.08);}
.vote-btn.voted-up{background:rgba(29,158,117,.12);border-color:var(--green);color:var(--green);}
.vote-btn.voted-dn{background:rgba(215,43,43,.12);border-color:var(--red);color:#E05555;}
.vote-btn.locked{opacity:.45;cursor:default;}
.thumb{font-size:11px;line-height:1;}
.compare-wrap{overflow-x:auto;}
.compare-table{width:100%;border-collapse:collapse;}
.compare-table th{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06);background:var(--bg3);font-weight:700;}
.compare-table th.r{text-align:right;}.compare-table th.c{text-align:center;}
.ctr{border-bottom:1px solid var(--border);transition:background .12s;animation:fadeUp .2s ease both;}
.ctr:hover{background:var(--bg3);}.ctr.champ{background:rgba(201,168,76,.04);}
.ctr td{padding:8px 12px;vertical-align:middle;}
.crank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--muted2);}
.crank.cc{font-size:11px;color:var(--gold);letter-spacing:.05em;}
.cname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--text);}
.ctr.champ .cname{color:var(--gold-light);}
.crecord{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;margin-top:1px;}
.off-rank{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--muted);text-align:center;}
.diff-cell{text-align:center;}
.dp{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;padding:2px 8px;border-radius:2px;}
.dp.up{background:rgba(29,158,117,.14);color:var(--green);}.dp.down{background:rgba(215,43,43,.12);color:#E05555;}.dp.same{background:var(--bg3);color:var(--muted2);}.dp.nr{background:rgba(201,168,76,.15);color:#C9A84C;}
.cscore{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--text);text-align:right;}
.sentiment-row{margin-top:10px;padding:9px 13px;background:var(--bg4);border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.sent-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.sent-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease;}
.official-note{margin-top:10px;padding:9px 13px;background:var(--bg4);border:1px solid var(--border);border-radius:3px;font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;line-height:1.5;}
/* Loading state */
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.1em;gap:10px;}
.loading-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:ldot 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:0.06em;line-height:1"><span style="color:var(--text)">cage</span><span style="color:var(--gold)">ranks</span></div>
  </div>
  <div class="header-right">
  </div>
</header>

<div class="sync-bar">
  <div class="sync-dot"></div>
  <span id="syncText">Loading data...</span>
</div>

<div class="hero">
  <h1>Fighter <em>Rankings</em></h1>
  <p>UFC divisional rankings built from win quality, title history, fan popularity, and cross-org performance. Updated weekly after every fight card. Vote to register community sentiment.</p>
</div>

<div class="nav-wrap">
  <div class="nav-row nav-row-men" id="navMen"></div>
  <div class="nav-row nav-row-women" id="navWomen"></div>
</div>

<div class="view-bar">
  <div class="view-toggle">
    <button class="view-btn active" id="vbtn-yours" onclick="setView('yours')">Our Rankings</button>
    <button class="view-btn" id="vbtn-official" onclick="setView('official')">Official UFC</button>
    <button class="view-btn" id="vbtn-compare" onclick="setView('compare')">Compare ↔</button>
  </div>
  <div class="div-label" id="divLabel"></div>
</div>

<div class="tp-strip" id="tpStrip"></div>
<div class="main" id="mainContent">
  <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
</div>

<script>
const DIVS_M=[
  {id:'hw', name:'Heavyweight',     lbs:'265'},
  {id:'lhw',name:'Lt. Heavyweight', lbs:'205'},
  {id:'mw', name:'Middleweight',    lbs:'185'},
  {id:'ww', name:'Welterweight',    lbs:'170'},
  {id:'lw', name:'Lightweight',     lbs:'155'},
  {id:'fw', name:'Featherweight',   lbs:'145'},
  {id:'bw', name:'Bantamweight',    lbs:'135'},
  {id:'flw',name:'Flyweight',       lbs:'125'},
];
const DIVS_W=[
  {id:'wsw', name:'Strawweight',  lbs:'115'},
  {id:'wflw',name:'Flyweight',    lbs:'125'},
  {id:'wbw', name:'Bantamweight', lbs:'135'},
];
const ALL_DIVS=[...DIVS_M,...DIVS_W];

let DB={};          // populated from data.json
let META={};        // populated from data.json
let curDiv='lw', curView='yours';

// ── LOCALSTORAGE VOTES ─────────────────────────────────────────────────────────
function lv(){try{return JSON.parse(localStorage.getItem('cr_votes')||'{}');}catch(e){return{};}}
function sv(v){try{localStorage.setItem('cr_votes',JSON.stringify(v));}catch(e){}}
function lc(){try{const s=localStorage.getItem('cr_counts');return s?JSON.parse(s):null;}catch(e){return null;}}
function sc(){
  const c={};
  for(const d in DB) c[d]=DB[d].yours.map(f=>({...f.votes}));
  try{localStorage.setItem('cr_counts',JSON.stringify(c));}catch(e){}
}
let myV=lv();

// ── LOAD DATA.JSON ──────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const res=await fetch('data.json?v='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    META=json.meta||{};
    // Merge loaded data with any saved vote counts from localStorage
    const savedCounts=lc();
    DB={};
    for(const divId in json.divisions){
      const divData=json.divisions[divId];
      DB[divId]=divData;
      // Restore vote counts from localStorage (they persist between data.json updates)
      if(savedCounts&&savedCounts[divId]){
        divData.yours.forEach((f,i)=>{
          if(savedCounts[divId][i]) f.votes=savedCounts[divId][i];
        });
      }
    }
    // Update header dates
    if(META.updated){
      document.getElementById('syncText').textContent=
        `Data refreshed weekly · Last sync: ${META.updated} · Next sync: ${META.next_update||'soon'}`;
    }
    buildNav();
    render();
  } catch(e){
    document.getElementById('mainContent').innerHTML=
      `<div class="loading" style="flex-direction:column;gap:12px">
        <span style="color:var(--red)">Could not load data.json</span>
        <span style="font-size:12px">${e.message}</span>
        <span style="font-size:11px;color:var(--muted)">Make sure data.json is in the same folder as index.html</span>
      </div>`;
  }
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function fmt(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+'k':String(n);}
function tagH(tags){
  return(tags||[]).map(t=>
    t==='former'?'<span class="tag tag-former">Former Champ</span>':
    t==='streak'?'<span class="tag tag-streak">Win Streak</span>':''
  ).join('');
}
function sbH(f){
  return`<div class="score-bars">
    <div class="mini-bar"><div class="mini-bar-fill" style="height:${f.pop}%;background:#C9A84C"></div></div>
    <div class="mini-bar"><div class="mini-bar-fill" style="height:${f.title}%;background:#D72B2B"></div></div>
    <div class="mini-bar"><div class="mini-bar-fill" style="height:${f.rec}%;background:#378ADD"></div></div>
  </div>`;
}
function vH(f){
  const k=curDiv+'|'+f.name, my=myV[k];
  const uc=my==='up'?'voted-up':my?'locked':'';
  const dc=my==='dn'?'voted-dn':my?'locked':'';
  const ua=my?'':` onclick="cv('${curDiv}','${f.name.replace(/'/g,"\\'")}','up')"`;
  const da=my?'':` onclick="cv('${curDiv}','${f.name.replace(/'/g,"\\'")}','dn')"`;
  return`<div class="vote-block">
    <button class="vote-btn up-btn ${uc}"${ua}><span class="thumb">👍</span> ${fmt(f.votes.up)}</button>
    <button class="vote-btn dn-btn ${dc}"${da}><span class="thumb">👎</span> ${fmt(f.votes.dn)}</button>
  </div>`;
}
function sentH(y){
  const up=y.reduce((s,f)=>s+f.votes.up,0),dn=y.reduce((s,f)=>s+f.votes.dn,0);
  const t=up+dn, p=t?Math.round(up/t*100):50;
  return`<div class="sentiment-row">
    <span style="color:var(--green);font-weight:700">${p}%</span>
    <span>community approval of this division's rankings</span>
    <div class="sent-track"><div class="sent-fill" style="width:${p}%"></div></div>
    <span style="color:var(--muted2);font-size:10px">${fmt(t)} votes</span>
  </div>`;
}

// ── VOTE ───────────────────────────────────────────────────────────────────────
function cv(divId,name,dir){
  const k=divId+'|'+name;
  if(myV[k])return;
  myV[k]=dir; sv(myV);
  const f=DB[divId]&&DB[divId].yours.find(x=>x.name===name);
  if(!f)return;
  if(dir==='up')f.votes.up++;else f.votes.dn++;
  sc(); render();
}

// ── TALKING POINTS ─────────────────────────────────────────────────────────────
function tp(){
  const data=DB[curDiv];
  if(!data)return;
  const y=data.yours, o=data.official||[];
  const diffs=y.map((f,yi)=>{
    if(f.champ)return null;
    const oi=o.findIndex(x=>x.name===f.name);
    const diff=oi===-1?3:(oi+1)-(yi+1);
    if(diff===0)return null;
    return{name:f.name,diff,oi,f};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,3);

  if(diffs.length===0){
    document.getElementById('tpStrip').innerHTML=
      `<div class="tp-label">Biggest disagreements with official UFC rankings</div>
       <div class="tp-cards"><div class="tp-card"><div class="tp-num neutral">≈</div>
       <div class="tp-body">Our rankings closely align with the official UFC panel for this division — no major gaps this week.</div>
       </div></div>`;
    return;
  }
  function why(item){
    const f=item.f, d=Math.abs(item.diff);
    if(item.diff>0){
      if(f.title>85)return`title pedigree lifts them <strong>${d}</strong> spots above the official panel`;
      if(f.pop>88)return`fan popularity pushes them <strong>${d}</strong> spots above the media vote`;
      if(f.cross>85)return`cross-org wins add <strong>${d}</strong> spots vs. official`;
      return`composite score places them <strong>${d}</strong> spots above the media panel`;
    }else{
      if(f.pop<65)return`low fan score pulls them <strong>${d}</strong> spots below official`;
      if(f.title<40)return`limited title history: official panel rates them <strong>${d}</strong> spots higher`;
      return`media panel favors them <strong>${d}</strong> spots more than our algorithm`;
    }
  }
  const cards=diffs.map(item=>{
    const up=item.diff>0, nr=item.oi===-1;
    const cls=nr?'':up?'tp-up':'tp-down', nc=nr?'neutral':up?'up':'down';
    const nt=nr?'NR':up?`↑${item.diff}`:`↓${Math.abs(item.diff)}`;
    return`<div class="tp-card ${cls}"><div class="tp-num ${nc}">${nt}</div>
      <div class="tp-body"><strong>${item.name}</strong> — ${why(item)}</div></div>`;
  }).join('');
  document.getElementById('tpStrip').innerHTML=
    `<div class="tp-label">Biggest disagreements with official UFC rankings</div>
     <div class="tp-cards">${cards}</div>`;
}

// ── NAV ────────────────────────────────────────────────────────────────────────
function buildNav(){
  const tab=d=>`<button class="weight-tab${d.id===curDiv?' active':''}" onclick="setDiv('${d.id}')">${d.name} <span class="tab-lbs">${d.lbs}</span></button>`;
  document.getElementById('navMen').innerHTML=`<span class="nav-row-label">Men's</span>`+DIVS_M.map(tab).join('');
  document.getElementById('navWomen').innerHTML=`<span class="nav-row-label">Women's</span>`+DIVS_W.map(tab).join('');
}
function setDiv(id){curDiv=id;buildNav();render();}
function setView(v){
  curView=v;
  ['yours','official','compare'].forEach(x=>document.getElementById('vbtn-'+x).classList.toggle('active',x===v));
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render(){
  const div=ALL_DIVS.find(d=>d.id===curDiv);
  const data=DB[curDiv];
  if(!div||!data){
    document.getElementById('mainContent').innerHTML=
      `<div class="loading"><span style="color:var(--muted)">No data for this division yet</span></div>`;
    return;
  }
  document.getElementById('divLabel').innerHTML=`<strong>${div.name}</strong> · ${div.lbs} lbs`;
  tp();
  const main=document.getElementById('mainContent');

  if(curView==='yours'){
    main.innerHTML=`
      <div class="col-header">
        <div class="col-title yours">Our Rankings — ${div.name}</div>
        <div class="col-legend">
          <div class="leg"><div class="leg-dot" style="background:#C9A84C"></div>Pop</div>
          <div class="leg"><div class="leg-dot" style="background:#D72B2B"></div>Title</div>
          <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>Record</div>
        </div>
      </div>
      <div class="fighter-list">${data.yours.map((f,i)=>`
        <div class="fighter-row${f.champ?' champ':''}">
          <div class="rank-num${f.champ?' c':''}">${f.champ?'C':i+1}</div>
          <div class="fighter-info">
            <div class="fighter-name">${f.name}</div>
            <div class="fighter-meta"><span class="record">${f.record}</span>${tagH(f.tags)}</div>
          </div>
          <div class="row-right">${vH(f)}
            <div class="score-block">
              <div class="score-val">${f.score}</div>
              <div class="score-lbl">Score</div>${sbH(f)}
            </div>
          </div>
        </div>`).join('')}
      </div>${sentH(data.yours)}`;

  }else if(curView==='official'){
    main.innerHTML=`
      <div class="col-header">
        <div class="col-title official">Official UFC Rankings — ${div.name}</div>
        <div style="font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em">Media panel vote</div>
      </div>
      <div class="fighter-list">${(data.official||[]).map((f,i)=>`
        <div class="fighter-row${f.champ?' champ':''}">
          <div class="rank-num${f.champ?' c':''}">${f.champ?'C':i+1}</div>
          <div class="fighter-info">
            <div class="fighter-name">${f.name}</div>
            <div class="fighter-meta"><span class="record">${f.record||''}</span></div>
          </div>
          <div class="row-right" style="font-size:10px;color:var(--muted2);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em">
            ${f.champ?'<span style="color:var(--gold)">Champion</span>':'Media vote'}
          </div>
        </div>`).join('')}
      </div>
      <div class="official-note">Official UFC rankings are voted on by a media panel. They do not account for fan popularity, pre-UFC career, or opposition quality scoring.</div>`;

  }else{
    const y=data.yours, o=data.official||[];
    const rows=y.map((f,yi)=>{
      const our=yi+1, oi=o.findIndex(x=>x.name===f.name);
      const ot=f.champ?'C':oi===-1?'—':oi+1;
      let dt='—',dc='same';
      if(!f.champ){
        if(oi===-1){dt='NR';dc='nr';}
        else{const d=(oi+1)-our;if(d>0){dt=`↑${d}`;dc='up';}else if(d<0){dt=`↓${Math.abs(d)}`;dc='down';}else{dt='=';dc='same';}}
      }
      return`<tr class="ctr${f.champ?' champ':''}">
        <td><div class="crank${f.champ?' cc':''}">${f.champ?'C':our}</div></td>
        <td><div class="cname">${f.name}</div><div class="crecord">${f.record}</div></td>
        <td class="off-rank">${ot}</td>
        <td class="diff-cell"><span class="dp ${dc}">${dt}</span></td>
        <td class="cscore">${f.score}</td>
        <td style="text-align:right">${vH(f)}</td>
      </tr>`;
    }).join('');
    main.innerHTML=`
      <div class="col-header">
        <div class="col-title yours">Our Rankings vs Official — ${div.name}</div>
        <div style="font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em">↑ we rank higher · ↓ UFC ranks higher</div>
      </div>
      <div class="compare-wrap">
        <table class="compare-table">
          <thead><tr>
            <th>Our #</th><th>Fighter</th>
            <th class="c">Official</th><th class="c">Diff</th>
            <th class="r">Score</th><th class="r">Community</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>${sentH(y)}`;
  }
}

// ── BOOT ───────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
